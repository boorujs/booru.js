on:
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Generate TypeDocs
        run: npm run docs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: "./typedoc/"
